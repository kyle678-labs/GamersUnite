name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kyle678/gamersunite

jobs:
  build-push-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Keel
        env:
          KEEL_WEBHOOK_URL: ${{ secrets.KEEL_WEBHOOK_URL }}
        run: |
          if [ -z "$KEEL_WEBHOOK_URL" ]; then
            echo "KEEL_WEBHOOK_URL secret not set - skipping Keel notification."
            exit 0
          fi
          curl -fsS -X POST "$KEEL_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${IMAGE}\", \"tag\": \"latest\"}"
          echo "Keel notified: ${IMAGE}:latest"
